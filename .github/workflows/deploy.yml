name: Deploy LFMT Infrastructure

# Automated CI/CD pipeline with secure OIDC authentication
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'shared-types/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/functions/package-lock.json

      - name: Install shared-types dependencies
        working-directory: shared-types
        run: npm ci

      - name: Install function dependencies
        working-directory: backend/functions
        run: npm ci

      - name: Lint backend functions
        working-directory: backend/functions
        run: npm run lint

      - name: Check backend formatting
        working-directory: backend/functions
        run: npm run format:check

      - name: Run function tests
        working-directory: backend/functions
        run: npm test

      - name: Check test coverage
        working-directory: backend/functions
        run: npm run test:coverage

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Check frontend formatting
        working-directory: frontend
        run: npm run format:check

      - name: Type-check frontend
        working-directory: frontend
        run: npm run type-check

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: development
      url: ${{ steps.get-frontend-url.outputs.frontend_url }}
    outputs:
      api_url: ${{ steps.get-url.outputs.api_url }}
      frontend_url: ${{ steps.get-frontend-url.outputs.frontend_url }}

    permissions:
      id-token: write # Required for OIDC authentication
      contents: read # Required to checkout code

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/infrastructure/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-LFMT-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Install shared-types dependencies
        working-directory: shared-types
        run: npm ci

      - name: Install function dependencies
        working-directory: backend/functions
        run: npm ci

      - name: Install infrastructure dependencies
        working-directory: backend/infrastructure
        run: npm ci

      - name: CDK Bootstrap (if needed)
        working-directory: backend/infrastructure
        run: |
          if ! aws cloudformation describe-stacks --stack-name CDKToolkit --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "CDKToolkit not found, bootstrapping..."
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            npx cdk bootstrap aws://${ACCOUNT_ID}/${{ env.AWS_REGION }}
          else
            echo "CDKToolkit already exists, skipping bootstrap"
          fi

      - name: CDK Deploy to Dev
        working-directory: backend/infrastructure
        run: npx cdk deploy --context environment=dev --require-approval never

      - name: Get API URL
        id: get-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name LfmtPocDev \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "API URL: $API_URL"

      - name: Test API Health
        run: |
          curl -f ${{ steps.get-url.outputs.api_url }}/v1/auth || echo "API not yet ready, may need warm-up"

      - name: Install shared-types for frontend rebuild
        working-directory: shared-types
        run: npm ci

      - name: Build shared-types for frontend rebuild
        working-directory: shared-types
        run: npm run build

      - name: Install frontend dependencies for rebuild
        working-directory: frontend
        run: npm ci

      - name: Rebuild frontend with correct API URL
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ steps.get-url.outputs.api_url }}

      - name: Get Frontend Bucket Name from CDK
        id: get-bucket-name
        run: |
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name LfmtPocDev \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "bucket_name=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
          echo "Frontend Bucket: $FRONTEND_BUCKET"

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.get-bucket-name.outputs.bucket_name }}/ --delete --cache-control "public, max-age=31536000, immutable" --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ steps.get-bucket-name.outputs.bucket_name }}/index.html --cache-control "public, max-age=0, must-revalidate"

      - name: Get CloudFront Distribution ID
        id: get-cf-dist
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name LfmtPocDev \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT
          echo "CloudFront Distribution ID: $DIST_ID"

      - name: Get CloudFront URL
        id: get-frontend-url
        run: |
          FRONTEND_URL=$(aws cloudformation describe-stacks \
            --stack-name LfmtPocDev \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "Frontend URL: $FRONTEND_URL"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ steps.get-cf-dist.outputs.distribution_id }} --paths "/*"
          echo "CloudFront cache invalidation initiated"

      - name: Wait for CloudFront cache invalidation
        run: |
          echo "Waiting for CloudFront invalidation to complete..."
          sleep 30

      - name: Validate Security Headers (Issue #62)
        run: |
          echo "========================================="
          echo "Live Security Header Validation"
          echo "========================================="
          FRONTEND_URL="${{ steps.get-frontend-url.outputs.frontend_url }}"
          echo "Testing URL: $FRONTEND_URL"
          echo ""

          # Fetch headers using -L to follow redirects. curl -sIL prints headers
          # for every hop; keep only the FINAL response block (the one a browser
          # actually sees). Splitting on blank lines (\r\n\r\n) with awk keeps
          # the last non-empty block.
          RAW_HEADERS=$(curl -sIL "$FRONTEND_URL")
          HEADERS=$(printf '%s' "$RAW_HEADERS" | awk 'BEGIN{RS="\r\n\r\n"} NF{last=$0} END{print last}')

          # Function to check header (case-insensitive grep so 301/302 variants
          # and differently-cased servers don't produce false negatives).
          check_header() {
            local header_name="$1"
            local header_pattern="$2"
            local required="$3"

            if echo "$HEADERS" | grep -i "^${header_name}:" > /dev/null; then
              local header_value=$(echo "$HEADERS" | grep -i "^${header_name}:" | cut -d: -f2- | tr -d '\r\n' | xargs)
              echo "✅ ${header_name}: ${header_value}"

              if [ -n "$header_pattern" ]; then
                if echo "$header_value" | grep -iE "$header_pattern" > /dev/null; then
                  echo "   ✓ Pattern match: $header_pattern"
                else
                  echo "   ❌ Pattern mismatch: expected pattern '$header_pattern'"
                  if [ "$required" = "true" ]; then
                    exit 1
                  fi
                fi
              fi
            else
              echo "❌ ${header_name}: NOT FOUND"
              if [ "$required" = "true" ]; then
                exit 1
              fi
            fi
            echo ""
          }

          # Validate critical security headers
          echo "Checking Security Headers:"
          echo "─────────────────────────────────────────"
          check_header "strict-transport-security" "max-age=" true
          check_header "x-content-type-options" "nosniff" true
          check_header "x-frame-options" "(DENY|SAMEORIGIN)" true
          check_header "content-security-policy" "default-src" true
          check_header "referrer-policy" "" false
          check_header "x-xss-protection" "" false

          echo "========================================="
          echo "✅ All required security headers validated"
          echo "========================================="

      - name: Validate CSP Hardening (Issue #63)
        run: |
          echo "========================================="
          echo "CSP Hardening Validation"
          echo "========================================="
          FRONTEND_URL="${{ steps.get-frontend-url.outputs.frontend_url }}"

          # Fetch CSP header. -L follows redirects (final response is what a
          # browser enforces); awk extracts the final response-headers block;
          # grep -i is case-insensitive.
          RAW_HEADERS=$(curl -sIL "$FRONTEND_URL")
          FINAL_HEADERS=$(printf '%s' "$RAW_HEADERS" | awk 'BEGIN{RS="\r\n\r\n"} NF{last=$0} END{print last}')
          CSP=$(echo "$FINAL_HEADERS" | grep -i "^content-security-policy:" | cut -d: -f2- | tr -d '\r\n' | xargs)

          echo "CSP Policy: $CSP"
          echo ""

          # CSP hardening status (Issue #133):
          #   - 'unsafe-eval' has been REMOVED from script-src (Part 2). The
          #     production bundle was inspected and contains no eval()/Function()
          #     calls; standard Vite + MUI/Emotion do not require it.
          #   - 'unsafe-inline' is still permitted (style-src + script-src) and
          #     will be removed when the nonce-injection pipeline lands
          #     (Lambda@Edge + Emotion CacheProvider). Tracked in the Part 1
          #     follow-up issue.
          # We therefore validate the non-unsafe hardening directives plus the
          # absence of 'unsafe-eval' as a regression guard.

          # Check that CSP contains baseline directives
          required_directives=("default-src" "script-src" "style-src" "connect-src")
          for directive in "${required_directives[@]}"; do
            if echo "$CSP" | grep -i "$directive" > /dev/null; then
              echo "✅ PASS: CSP contains '$directive' directive"
            else
              echo "❌ FAIL: CSP missing '$directive' directive"
              exit 1
            fi
          done

          # Check that CSP contains additional hardening directives (retained
          # from the Issue #63 pass even though 'unsafe-inline' remains).
          hardening_directives=(
            "object-src 'none'"
            "base-uri 'self'"
            "form-action 'self'"
            "frame-ancestors 'none'"
            "upgrade-insecure-requests"
          )
          for directive in "${hardening_directives[@]}"; do
            if echo "$CSP" | grep -iF "$directive" > /dev/null; then
              echo "✅ PASS: CSP contains hardening directive: $directive"
            else
              echo "❌ FAIL: CSP missing hardening directive: $directive"
              exit 1
            fi
          done

          # Regression guard (Issue #133 Part 2): 'unsafe-eval' must NOT appear
          # in the script-src directive of the deployed CSP.
          if echo "$CSP" | grep -iF "'unsafe-eval'" > /dev/null; then
            echo "❌ FAIL: CSP contains 'unsafe-eval' (regression — Issue #133 Part 2)"
            exit 1
          else
            echo "✅ PASS: CSP does not contain 'unsafe-eval' (Issue #133 Part 2)"
          fi

          echo ""
          echo "========================================="
          echo "✅ CSP hardening requirements met"
          echo "========================================="

      - name: Frontend Deployment Summary
        run: |
          echo "========================================="
          echo "Frontend Deployment Summary"
          echo "========================================="
          echo "S3 Bucket: ${{ steps.get-bucket-name.outputs.bucket_name }}"
          echo "CloudFront Distribution: ${{ steps.get-cf-dist.outputs.distribution_id }}"
          echo "Frontend URL: ${{ steps.get-frontend-url.outputs.frontend_url }}"
          echo "API URL: ${{ steps.get-url.outputs.api_url }}"
          echo "========================================="

  production-smoke-tests:
    name: Run Production Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend to be ready..."
          for i in {1..30}; do
            if curl -sf ${{ needs.deploy-dev.outputs.frontend_url }}/ > /dev/null 2>&1; then
              echo "Frontend is ready!"
              exit 0
            fi
            echo "Attempt $i/30: Frontend not ready yet, waiting 10 seconds..."
            sleep 10
          done
          echo "Proceeding with tests..."

      - name: Run production smoke tests
        working-directory: frontend
        run: npx playwright test --grep @smoke
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-dev.outputs.frontend_url }}
          API_BASE_URL: ${{ needs.deploy-dev.outputs.api_url }}
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
          CI: true

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload smoke test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-videos
          path: frontend/test-results/
          retention-days: 7

      - name: Production Smoke Test Summary
        if: always()
        run: |
          echo "========================================="
          echo "Production Smoke Test Summary"
          echo "========================================="
          echo "Frontend URL: ${{ needs.deploy-dev.outputs.frontend_url }}"
          echo "API URL: ${{ needs.deploy-dev.outputs.api_url }}"
          echo "Tests completed at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "========================================="

  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/tests/smoke/package-lock.json

      - name: Install smoke test dependencies
        working-directory: backend/tests/smoke
        run: npm ci

      - name: Run smoke tests against deployed API
        working-directory: backend/tests/smoke
        run: npm run test:smoke
        env:
          API_URL: ${{ needs.deploy-dev.outputs.api_url }}
          TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
          USER_POOL_ID: ${{ secrets.DEV_USER_POOL_ID }}

      - name: Smoke Test Summary
        if: always()
        run: |
          echo "========================================="
          echo "Smoke Test Summary"
          echo "========================================="
          echo "API URL: ${{ needs.deploy-dev.outputs.api_url }}"
          echo "Tests completed at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "========================================="

  integration-tests:
    name: Run Backend Integration Tests
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/functions/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-LFMT-Integration-Tests
          aws-region: ${{ env.AWS_REGION }}

      - name: Install shared-types dependencies
        working-directory: shared-types
        run: npm ci

      - name: Install function dependencies
        working-directory: backend/functions
        run: npm ci

      - name: Get API URL
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name LfmtPocDev \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "Using API URL: $API_URL"

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API to be ready..."
          for i in {1..30}; do
            # Check if API Gateway responds (any HTTP status including 401 is acceptable)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" ${{ steps.get-api-url.outputs.api_url }}auth/me 2>/dev/null || echo "000")
            if [[ "$HTTP_CODE" != "000" && "$HTTP_CODE" != "502" && "$HTTP_CODE" != "503" && "$HTTP_CODE" != "504" ]]; then
              echo "API is ready! (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i/30: API not ready yet (HTTP $HTTP_CODE), waiting 10 seconds..."
            sleep 10
          done
          echo "Warning: API may not be fully ready, proceeding with tests anyway"
        continue-on-error: true

      - name: Run Health Check Integration Tests
        working-directory: backend/functions
        run: npm run test:integration -- health-check.integration.test.ts
        env:
          API_BASE_URL: ${{ steps.get-api-url.outputs.api_url }}

      - name: Run API Integration Tests
        working-directory: backend/functions
        run: npm run test:integration -- api-integration.test.ts
        env:
          API_BASE_URL: ${{ steps.get-api-url.outputs.api_url }}

      - name: Run Translation Flow Integration Tests
        working-directory: backend/functions
        run: npm run test:integration -- translation-flow.integration.test.ts --testTimeout=600000
        env:
          API_BASE_URL: ${{ steps.get-api-url.outputs.api_url }}
          TEST_TIMEOUT: 600000

      - name: Backend Integration Test Summary
        if: always()
        run: |
          echo "========================================="
          echo "Backend Integration Test Summary"
          echo "========================================="
          echo "API URL: ${{ steps.get-api-url.outputs.api_url }}"
          echo "Tests completed at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "========================================="

  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend to be ready..."
          for i in {1..30}; do
            if curl -sf ${{ needs.deploy-dev.outputs.frontend_url }}/ > /dev/null 2>&1; then
              echo "Frontend is ready!"
              exit 0
            fi
            echo "Attempt $i/30: Frontend not ready yet, waiting 10 seconds..."
            sleep 10
          done
          echo "Proceeding with tests..."

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-dev.outputs.frontend_url }}
          API_BASE_URL: ${{ needs.deploy-dev.outputs.api_url }}
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: frontend/test-results/
          retention-days: 7

      - name: E2E Test Summary
        if: always()
        run: |
          echo "========================================="
          echo "E2E Test Summary"
          echo "========================================="
          echo "Frontend URL: ${{ needs.deploy-dev.outputs.frontend_url }}"
          echo "API URL: ${{ needs.deploy-dev.outputs.api_url }}"
          echo "Tests completed at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "========================================="

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.lfmt.yourcompany.com

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-LFMT-Deploy-Staging
          aws-region: ${{ env.AWS_REGION }}

      - name: Install shared-types dependencies
        working-directory: shared-types
        run: npm ci

      - name: Install function dependencies
        working-directory: backend/functions
        run: npm ci

      - name: Install infrastructure dependencies
        working-directory: backend/infrastructure
        run: npm ci

      - name: CDK Deploy to Staging
        working-directory: backend/infrastructure
        run: npx cdk deploy --context environment=staging --require-approval never

      - name: Get API URL
        id: get-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name LfmtPocStaging \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "API URL: $API_URL"

      - name: Install shared-types for frontend rebuild
        working-directory: shared-types
        run: npm ci

      - name: Build shared-types for frontend rebuild
        working-directory: shared-types
        run: npm run build

      - name: Install frontend dependencies for rebuild
        working-directory: frontend
        run: npm ci

      - name: Rebuild frontend with correct API URL
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ steps.get-url.outputs.api_url }}

      - name: Get Frontend Bucket Name from CDK
        id: get-bucket-name
        run: |
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name LfmtPocStaging \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "bucket_name=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
          echo "Frontend Bucket: $FRONTEND_BUCKET"

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.get-bucket-name.outputs.bucket_name }}/ --delete --cache-control "public, max-age=31536000, immutable" --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ steps.get-bucket-name.outputs.bucket_name }}/index.html --cache-control "public, max-age=0, must-revalidate"

      - name: Get CloudFront Distribution ID
        id: get-cf-dist
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name LfmtPocStaging \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT
          echo "CloudFront Distribution ID: $DIST_ID"

      - name: Get CloudFront URL
        id: get-frontend-url
        run: |
          FRONTEND_URL=$(aws cloudformation describe-stacks \
            --stack-name LfmtPocStaging \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "Frontend URL: $FRONTEND_URL"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ steps.get-cf-dist.outputs.distribution_id }} --paths "/*"
          echo "CloudFront cache invalidation initiated"

      - name: Frontend Deployment Summary
        run: |
          echo "========================================="
          echo "Frontend Deployment Summary"
          echo "========================================="
          echo "S3 Bucket: ${{ steps.get-bucket-name.outputs.bucket_name }}"
          echo "CloudFront Distribution: ${{ steps.get-cf-dist.outputs.distribution_id }}"
          echo "Frontend URL: ${{ steps.get-frontend-url.outputs.frontend_url }}"
          echo "API URL: ${{ steps.get-url.outputs.api_url }}"
          echo "========================================="

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment:
      name: production
      url: https://lfmt.yourcompany.com

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-LFMT-Deploy-Prod
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: |
          echo "Deploying to production with identity:"
          aws sts get-caller-identity

      - name: Install shared-types dependencies
        working-directory: shared-types
        run: npm ci

      - name: Install function dependencies
        working-directory: backend/functions
        run: npm ci

      - name: Install infrastructure dependencies
        working-directory: backend/infrastructure
        run: npm ci

      - name: CDK Bootstrap (if needed)
        working-directory: backend/infrastructure
        run: |
          if ! aws cloudformation describe-stacks --stack-name CDKToolkit --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "CDKToolkit not found, bootstrapping..."
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            npx cdk bootstrap aws://${ACCOUNT_ID}/${{ env.AWS_REGION }}
          else
            echo "CDKToolkit already exists, skipping bootstrap"
          fi

      - name: CDK Diff (show changes)
        working-directory: backend/infrastructure
        run: npx cdk diff --context environment=prod || true

      - name: CDK Deploy Main Infrastructure
        working-directory: backend/infrastructure
        run: npx cdk deploy LfmtPocProd --context environment=prod --require-approval never

      - name: Get API Gateway URL
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name LfmtPocProd \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "Production API URL: $API_URL"

      - name: Install shared-types for frontend rebuild
        working-directory: shared-types
        run: npm ci

      - name: Build shared-types for frontend rebuild
        working-directory: shared-types
        run: npm run build

      - name: Install frontend dependencies for rebuild
        working-directory: frontend
        run: npm ci

      - name: Rebuild frontend with correct API URL
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ steps.get-api-url.outputs.api_url }}

      - name: Get Frontend Bucket Name from CDK
        id: get-bucket-name
        run: |
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name LfmtPocProd \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "bucket_name=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
          echo "Frontend Bucket: $FRONTEND_BUCKET"

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.get-bucket-name.outputs.bucket_name }}/ --delete --cache-control "public, max-age=31536000, immutable" --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ steps.get-bucket-name.outputs.bucket_name }}/index.html --cache-control "public, max-age=0, must-revalidate"

      - name: Get CloudFront Distribution ID
        id: get-cf-dist
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name LfmtPocProd \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT
          echo "CloudFront Distribution ID: $DIST_ID"

      - name: Get CloudFront URL
        id: get-frontend-url
        run: |
          FRONTEND_URL=$(aws cloudformation describe-stacks \
            --stack-name LfmtPocProd \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "Frontend URL: $FRONTEND_URL"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ steps.get-cf-dist.outputs.distribution_id }} --paths "/*"
          echo "CloudFront cache invalidation initiated"

      - name: Frontend Deployment Summary
        run: |
          echo "========================================="
          echo "Production Deployment Summary"
          echo "========================================="
          echo "Environment: production"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "Stack: LfmtPocProd"
          echo "S3 Bucket: ${{ steps.get-bucket-name.outputs.bucket_name }}"
          echo "CloudFront Distribution: ${{ steps.get-cf-dist.outputs.distribution_id }}"
          echo "Frontend URL: ${{ steps.get-frontend-url.outputs.frontend_url }}"
          echo "API URL: ${{ steps.get-api-url.outputs.api_url }}"
          echo "Deployed at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "========================================="
