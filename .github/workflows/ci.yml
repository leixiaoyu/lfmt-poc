name: CI - Continuous Integration

# Run on all pull requests and pushes to any branch
on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches-ignore:
      - main # Main branch uses deploy-backend.yml + deploy-frontend.yml workflows (Issue #157)

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/functions/package-lock.json
            backend/infrastructure/package-lock.json
            shared-types/package-lock.json

      - name: Install shared-types dependencies
        working-directory: shared-types
        run: npm ci

      - name: Run shared-types tests
        working-directory: shared-types
        run: npm test

      - name: Install function dependencies
        working-directory: backend/functions
        run: npm ci

      - name: Run function tests
        working-directory: backend/functions
        run: npm test

      - name: Check test coverage
        working-directory: backend/functions
        run: npm run test:coverage

  build-infrastructure:
    name: Build Infrastructure
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/infrastructure/package-lock.json

      - name: Install shared-types dependencies
        working-directory: shared-types
        run: npm ci

      - name: Install function dependencies
        working-directory: backend/functions
        run: npm ci

      - name: Install infrastructure dependencies
        working-directory: backend/infrastructure
        run: npm ci

      - name: Build infrastructure
        working-directory: backend/infrastructure
        run: npm run build

      - name: Run infrastructure tests
        working-directory: backend/infrastructure
        run: npm test

      - name: CDK Synth (validate CloudFormation)
        working-directory: backend/infrastructure
        run: npx cdk synth --context environment=dev --context skipLambdaBundling=true

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    # Catches the class of drift that caused Issues #149, #152, #154 — broken
    # workflow files merging green because nothing parsed them for semantic
    # correctness. Two checks:
    #   1. actionlint: validates GitHub Actions expression syntax, needs:
    #      references, action input names, shellcheck on run: blocks.
    #   2. deploy-{backend,frontend}.yml gated-job parity: in EACH deploy
    #      workflow, the deploy-dev job and its trailing verification jobs
    #      (the "cascade") MUST share an identical if: expression so they
    #      run as a unit. Drift here would silently skip post-deploy
    #      verification on manual dispatch (the exact bug PR #159 fixed for
    #      the inverse case). Updated for Issue #157 split: previously
    #      checked a single deploy.yml; now checks both halves separately.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install actionlint (pinned)
        run: |
          # Pin to 1.7.12 — same version verified locally during PR #159 audit.
          # Bump deliberately when adopting new actionlint features.
          bash <(curl -sf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12 /usr/local/bin
          actionlint --version

      - name: Run actionlint on all workflow files
        # `-shellcheck "shellcheck -S warning"` keeps warning + error severity
        # but suppresses info-level findings. The Ubuntu runner has shellcheck
        # preinstalled, so actionlint invokes it on every `run:` block. Most
        # info-level findings on these workflows are SC2086 false positives —
        # shellcheck flags `${{ steps.X.outputs.Y }}` as un-quoted bash
        # interpolation, but those are GH Actions expressions substituted at
        # YAML-processing time, not bash variables. Real bash quoting bugs
        # would still fire as warnings/errors and be caught.
        run: actionlint -color -shellcheck "shellcheck -S warning"

      - name: Verify deploy workflow gated-job condition parity
        run: |
          python3 <<'PYEOF'
          import sys
          import yaml

          # Issue #157 split: one parity check per deploy workflow. Each
          # workflow's "deploy-dev cascade" (deploy job + verification jobs
          # that need: it) must share an identical if: expression so the
          # cascade runs as a unit. The two cascades are independent —
          # backend and frontend can have different conditions across files,
          # but the jobs WITHIN a file must agree.
          DEPLOY_WORKFLOWS = {
              '.github/workflows/deploy-backend.yml': [
                  'deploy-dev',
                  'smoke-tests',
                  'integration-tests',
              ],
              '.github/workflows/deploy-frontend.yml': [
                  'deploy-dev-frontend',
                  'production-smoke-tests',
                  'e2e-tests',
              ],
          }

          had_error = False
          for wf_path, gated_jobs in DEPLOY_WORKFLOWS.items():
              with open(wf_path) as f:
                  wf = yaml.safe_load(f)

              conditions = {job: wf['jobs'][job].get('if', '') for job in gated_jobs}
              unique = set(conditions.values())

              if len(unique) != 1:
                  print(f'::error file={wf_path}::{wf_path} gated jobs have divergent if: expressions — cascade will silently partial-skip')
                  for job, cond in conditions.items():
                      print(f'  {job}: {cond}', file=sys.stderr)
                  had_error = True
                  continue

              print(f'OK ({wf_path}): all {len(gated_jobs)} gated jobs share an identical if: expression')
              print(f'  Condition: {next(iter(unique))}')

          if had_error:
              sys.exit(1)
          PYEOF

      - name: Verify deploy workflow path-filter contracts
        # OMC test-automator follow-up (PR #185 R2): asserts each deploy
        # workflow's on.push.paths contains the EXPECTED globs (and excludes
        # forbidden globs that would over-trigger across the split). Adding a
        # 3rd deploy workflow in the future requires updating the EXPECTED /
        # FORBIDDEN dicts in the script. See tracking issue for auto-discovery.
        run: python3 tests/workflows/test_deploy_path_filters.py

  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/functions/package-lock.json
            shared-types/package-lock.json
            frontend/package-lock.json

      - name: Install shared-types dependencies
        working-directory: shared-types
        run: npm ci

      - name: Build shared-types (needed for frontend type-check)
        working-directory: shared-types
        run: npm run build

      - name: Install function dependencies
        working-directory: backend/functions
        run: npm ci

      # Mirror deploy.yml's lint + format:check so PRs surface deploy-blockers
      # BEFORE merge. Previously these used --if-present || echo, which masked
      # failures and let PRs merge green while deploy.yml silently rejected the
      # same code (Issue #149).
      - name: Lint functions
        working-directory: backend/functions
        run: npm run lint

      - name: Check backend formatting
        working-directory: backend/functions
        run: npm run format:check

      - name: Check TypeScript compilation
        working-directory: backend/functions
        run: npx tsc --noEmit

      # Frontend lint/format/type-check — mirrors the steps deploy.yml's
      # "Run Tests" job runs, so PRs surface deploy-blocking violations
      # BEFORE merge instead of failing on main. Closes the historical
      # ci.yml/deploy.yml lint-coverage gap that PR #149 / #152 partially
      # closed (backend only) and the OMC audit flagged for completion.
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Check frontend formatting
        working-directory: frontend
        run: npm run format:check

      - name: Type-check frontend
        working-directory: frontend
        run: npm run type-check

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install shared-types dependencies
        working-directory: shared-types
        run: npm ci

      - name: Install function dependencies
        working-directory: backend/functions
        run: npm ci

      - name: Run npm audit (functions)
        working-directory: backend/functions
        run: npm audit --audit-level=high || echo "Audit completed with warnings"

      - name: Install infrastructure dependencies
        working-directory: backend/infrastructure
        run: npm ci

      - name: Run npm audit (infrastructure)
        working-directory: backend/infrastructure
        run: npm audit --audit-level=high || echo "Audit completed with warnings"

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install shared-types dependencies
        working-directory: shared-types
        run: npm ci

      - name: Build shared-types
        working-directory: shared-types
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test Frontend (with coverage)
        working-directory: frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  # Temporarily disabled: E2E tests require backend API or mock API setup
  # Re-enable after configuring mock API for E2E tests or deploying test backend
  # test-e2e:
