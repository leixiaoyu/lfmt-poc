name: Deploy LFMT Backend

# Backend deployment pipeline (Issue #157 split):
#
# This workflow handles the BACKEND half of what used to be the monolithic
# deploy.yml. It triggers on backend or shared-types changes and runs the
# full CDK deploy + API-level verification cascade. The frontend half lives
# in `.github/workflows/deploy-frontend.yml`.
#
# Why the split? Pre-split, every frontend-only commit (CSS tweak, copy
# change) ran the full ~15-20 min backend pipeline including a noop CDK
# deploy and backend integration tests against an unchanged API. After the
# split, frontend commits run only the frontend pipeline (~5-7 min) and
# backend commits run only this one. shared-types/** triggers BOTH, since
# both halves depend on the shared types package.
#
# See `docs/CI-CD-ARCHITECTURE.md` for the full rationale and operational
# coordination requirements (branch-protection rule names, parity checks).
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'shared-types/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      environment:
        # NOTE: default is 'dev' — running `gh workflow run deploy-backend.yml --ref main`
        # with no `-f environment=...` flag triggers a real deploy to LfmtPocDev
        # (CDK + smoke + integration). Pick `staging` or `prod` explicitly to
        # target those stacks instead.
        description: 'Environment to deploy (dev triggers a real deploy to LfmtPocDev)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '22'

# Concurrency group (OMC perf + architect review, PR #185 follow-up):
#
# `shared-types/**` triggers BOTH deploy-backend.yml AND deploy-frontend.yml.
# Without coordination, the two workflows race: deploy-frontend.yml can read
# stale CloudFormation outputs (and therefore the old API URL) and S3-sync a
# stale bundle to CloudFront BEFORE deploy-backend.yml's own frontend rebuild
# step finishes pushing the fresh URL.
#
# Both workflows share the SAME group name (`deploy-${ref}`) so GitHub Actions
# serializes them per ref. The frontend pipeline waits for the backend pipeline
# (or vice versa) instead of racing.
#
# `cancel-in-progress: false` — never abort an in-flight deploy. Aborting an
# active CDK or S3 sync risks partial state. Trade-off: occasional short queue
# wait when shared-types lands; acceptable.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests (Backend)
    runs-on: ubuntu-latest
    # ci.yml ↔ deploy-backend.yml parity (Phase 1.1 audit, 2026-04-18;
    # split out of monolithic deploy.yml in Issue #157):
    #
    # This job is the deploy-time gate for backend changes on main. It is
    # intentionally a SUBSET of ci.yml's PR-time gates. ci.yml runs on every
    # PR and covers the full matrix (test, lint-and-format, build-infrastructure,
    # security-scan, test-frontend). The contract is: any code that reaches
    # main has already passed the full ci.yml suite, so this job only
    # re-verifies the deploy-blocking subset (lint, format, type-check,
    # backend tests + coverage) against the merged main commit. Frontend
    # lint/format/type-check is handled by the parallel `Run Tests (Frontend)`
    # job in deploy-frontend.yml.
    #
    # PARITY ENFORCEMENT (Issue #156): the ci.yml workflow-lint job includes a
    # programmatic step `Verify ci.yml ↔ deploy-backend.yml step-list parity`
    # that parses both files and asserts every step name in THIS job also
    # appears in ci.yml's `test` or `lint-and-format` job. Adding a new step
    # here without adding the matching step to ci.yml will FAIL the workflow-lint
    # job on the next PR and block merge. To explicitly exempt a legitimately
    # deploy-only step, add `# parity:exempt — <reason>` on the line before
    # `- name:`.
    #
    # Steps that ci.yml runs but this job intentionally does NOT:
    #   - shared-types `npm test` (ci.yml `test` job)        [PR-gate only]
    #   - backend `npx tsc --noEmit`  (ci.yml lint-and-format)[PR-gate only;
    #     checks every .ts file, not just tests — narrower than `npm test`]
    #   - infrastructure build/test/cdk-synth (ci.yml build-infrastructure)
    #     [the `cdk deploy` below implicitly re-synths; PR gate is authoritative]
    #   - npm audit                   (ci.yml security-scan) [PR-gate only]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          # Cache both lockfiles touched by this job (shared-types,
          # backend/functions). actions/setup-node accepts a multi-line list
          # and hashes them together for a single composite cache key.
          cache-dependency-path: |
            shared-types/package-lock.json
            backend/functions/package-lock.json

      - name: Install shared-types dependencies
        working-directory: shared-types
        run: npm ci

      # Build shared-types so backend's tsc/test runs can resolve the
      # '@lfmt/shared-types' package entry (dist/). Mirrors ci.yml
      # lint-and-format and the deploy-dev job below.
      - name: Build shared-types
        working-directory: shared-types
        run: npm run build

      - name: Install function dependencies
        working-directory: backend/functions
        run: npm ci

      - name: Lint backend functions
        working-directory: backend/functions
        run: npm run lint

      - name: Check backend formatting
        working-directory: backend/functions
        run: npm run format:check

      - name: Run function tests
        working-directory: backend/functions
        run: npm test

      - name: Check test coverage
        working-directory: backend/functions
        run: npm run test:coverage

  deploy-dev:
    name: Deploy Backend to Development
    runs-on: ubuntu-latest
    needs: test
    # Boy-scout (#253 expansion round): mirror the `timeout-minutes` discipline
    # that `smoke-tests` (15) and `integration-tests` (30) already enforce
    # (added by PR #240). A stuck `cdk deploy` against a hung CloudFormation
    # update would otherwise hold the `deploy-${ref}` concurrency lock
    # indefinitely, blocking every subsequent deploy + the parallel
    # deploy-frontend.yml workflow (shared concurrency group). Observed noop
    # deploy-dev runs finish in <5 min (e.g. run 25770555446: 3m48s); a real
    # deploy with frontend rebuild + CloudFront invalidation lands well inside
    # 15 min. 30 gives ~6x headroom while still failing loud if CFN hangs.
    timeout-minutes: 30
    # Trigger conditions:
    #   - push to main → automatic deploy
    #   - workflow_dispatch with environment=dev → manual deploy (escape hatch)
    # The manual path was added after Issue #158 (cdk import for
    # TranslationApiKeySecret) when we needed to verify a hand-fix without
    # piggy-backing on an unrelated commit.
    #
    # Drift-prevention history: this file's predecessor (deploy.yml) had
    # three trigger-related incidents in one quarter (Issue #149 backend
    # lint regression, PR #152 shared-types build, PR #154 frontend trigger
    # gap). Do NOT collapse this condition back to `event_name == 'push'`
    # without re-adding a manual dev-redeploy path elsewhere.
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev'))
    environment:
      name: development
      url: ${{ steps.cfn-outputs.outputs.frontend_url }}
    # Issue #248: outputs were previously sourced from `steps.get-*.outputs.*`
    # alias steps that just echoed `steps.cfn-outputs.outputs.*`. The aliases
    # existed during the #163/#187 refactor to avoid a mass find-replace; now
    # that all callers reference `cfn-outputs` directly, the aliases are dead
    # weight and have been removed (4 echo steps deleted).
    outputs:
      api_url: ${{ steps.cfn-outputs.outputs.api_url }}
      frontend_url: ${{ steps.cfn-outputs.outputs.frontend_url }}

    permissions:
      id-token: write # Required for OIDC authentication
      contents: read # Required to checkout code

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          # deploy-dev runs `npm ci` in four directories below: shared-types,
          # backend/functions, backend/infrastructure, and frontend. The
          # frontend rebuild is required to pick up the freshly-deployed
          # API URL via VITE_API_URL — backend infra changes can rotate the
          # API Gateway URL, so the frontend bundle must be rebuilt and
          # pushed to S3 to stay in sync. (Frontend-only commits do NOT
          # trigger this workflow; deploy-frontend.yml handles those.)
          cache-dependency-path: |
            shared-types/package-lock.json
            backend/functions/package-lock.json
            backend/infrastructure/package-lock.json
            frontend/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-LFMT-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Install shared-types dependencies
        working-directory: shared-types
        run: npm ci

      - name: Install function dependencies
        working-directory: backend/functions
        run: npm ci

      - name: Install infrastructure dependencies
        working-directory: backend/infrastructure
        run: npm ci

      - name: CDK Bootstrap (if needed)
        working-directory: backend/infrastructure
        run: |
          if ! aws cloudformation describe-stacks --stack-name CDKToolkit --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "CDKToolkit not found, bootstrapping..."
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            npx cdk bootstrap aws://${ACCOUNT_ID}/${{ env.AWS_REGION }}
          else
            echo "CDKToolkit already exists, skipping bootstrap"
          fi

      # Issue #163 — CDK diff short-circuit.
      #
      # `cdk diff` is informational: it exits 0 whether or not there are
      # differences. The string "There were no differences" only appears when
      # the diff is truly empty. We capture both stdout and stderr (CDK writes
      # to stderr on some versions) and check both.
      #
      # When has_changes=false the CDK deploy, S3 sync, CloudFront invalidation,
      # and CF-wait steps are all skipped. The CFN describe-stacks call below
      # still runs (needed to populate step outputs for smoke/integration tests),
      # but that is cheap (~500ms) versus the ~5-8 min CDK deploy.
      #
      # Typical savings per noop deploy: ~10 min wall-clock + 1 CloudFront
      # invalidation slot (3000/month free, then $0.005/path).
      #
      # Safety note: `|| true` is intentional. `cdk diff` exits 1 when real
      # differences ARE present (i.e. the diff case — not the no-diff case).
      # Without `|| true`, the step would fail on every real infrastructure
      # change, which is exactly the wrong behaviour. The "There were no
      # differences" grep on DIFF_OUTPUT is the authoritative no-op gate;
      # `|| true` simply ensures the step never hard-fails regardless of exit
      # code. On first-ever deploy, `cdk diff` exits non-zero AND prints no
      # "no differences" message, so has_changes=true fires correctly — no
      # special handling needed.
      - name: Check for CDK infrastructure changes
        id: cdk-diff
        working-directory: backend/infrastructure
        run: |
          DIFF_OUTPUT=$(npx cdk diff --context environment=dev 2>&1) || true
          echo "--- CDK diff output ---"
          echo "$DIFF_OUTPUT"
          echo "--- end diff output ---"
          if echo "$DIFF_OUTPUT" | grep -q "There were no differences"; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "::notice::No CDK infrastructure changes detected — skipping cdk deploy, S3 sync, and CloudFront invalidation"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "::notice::CDK infrastructure changes detected — proceeding with full deploy"
          fi

      - name: CDK Deploy to Dev
        if: steps.cdk-diff.outputs.has_changes == 'true'
        working-directory: backend/infrastructure
        run: npx cdk deploy --context environment=dev --require-approval never

      # Collapse 4 separate describe-stacks calls (Issue #163 bonus) into one
      # jq parse. Each call was ~500ms-1s; this saves ~2-3s per deploy and
      # reduces CFN API pressure. All four outputs are populated regardless of
      # whether a CDK deploy ran — downstream steps (smoke, integration) need
      # the outputs unconditionally.
      - name: Get CloudFormation outputs
        id: cfn-outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name LfmtPocDev \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].Outputs' \
            --output json)
          API_URL=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="ApiUrl") | .OutputValue')
          BUCKET=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="FrontendBucketName") | .OutputValue')
          DIST_ID=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="CloudFrontDistributionId") | .OutputValue')
          FRONTEND_URL=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="FrontendUrl") | .OutputValue')
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "bucket_name=$BUCKET" >> $GITHUB_OUTPUT
          echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT
          echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "API URL: $API_URL"
          echo "Bucket: $BUCKET"
          echo "CloudFront Distribution: $DIST_ID"
          echo "Frontend URL: $FRONTEND_URL"

      # Issue #248: 4 legacy alias steps (`Get API URL`, `Get Frontend Bucket
      # Name from CDK`, `Get CloudFront Distribution ID`, `Get CloudFront URL`)
      # that echoed `steps.cfn-outputs.outputs.*` removed. All downstream
      # callers (job outputs, environment URL, Backend Deployment Summary,
      # Test API Health) now reference `steps.cfn-outputs.outputs.*` directly.

      - name: Test API Health
        run: |
          curl -f ${{ steps.cfn-outputs.outputs.api_url }}/v1/auth || echo "API not yet ready, may need warm-up"

      # Backend deploys still rebuild + sync the frontend because the
      # newly-deployed API URL must be baked into the frontend bundle
      # (VITE_API_URL is build-time, not runtime). Frontend-only commits
      # take the lighter `deploy-frontend.yml` path which reads the existing
      # API URL from CFN outputs without a CDK deploy.
      # Gated on has_changes=true (Issue #163) — when the CDK diff was empty,
      # the API URL has not changed and the current S3 bundle is still valid.
      # Issue #187: rebuild sequence extracted to composite action for DRY.
      - name: Rebuild and deploy frontend (has changes)
        if: steps.cdk-diff.outputs.has_changes == 'true'
        uses: ./.github/actions/rebuild-frontend
        with:
          stack-name: LfmtPocDev
          aws-region: ${{ env.AWS_REGION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Backend Deployment Summary
        run: |
          echo "========================================="
          echo "Backend Deployment Summary"
          echo "========================================="
          echo "CDK changes deployed: ${{ steps.cdk-diff.outputs.has_changes }}"
          echo "S3 Bucket: ${{ steps.cfn-outputs.outputs.bucket_name }}"
          echo "CloudFront Distribution: ${{ steps.cfn-outputs.outputs.distribution_id }}"
          echo "Frontend URL: ${{ steps.cfn-outputs.outputs.frontend_url }}"
          echo "API URL: ${{ steps.cfn-outputs.outputs.api_url }}"
          echo "========================================="

  smoke-tests:
    name: Run API Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-dev
    # Boy-scout (#240): add timeout-minutes so a hung smoke run cannot
    # hold the deploy-${ref} concurrency lock indefinitely. Smoke tests
    # typically finish in under 2 minutes; 15 gives headroom.
    timeout-minutes: 15
    # Issue #211 — smoke test policy decision:
    #
    # Smoke tests are NOT in branch-protection required checks because they
    # run post-deploy (they need a live stack) and cannot block the CURRENT
    # merge — they would block the NEXT merge. Option B (suppression-with-
    # rationale) is the chosen policy instead of Option A (required gate):
    #
    #   Option A (required gate): promotes this job to a branch-protection
    #     required check. Rejected because the timing is wrong — a failed
    #     smoke test after merging PR N blocks PR N+1, not N. This creates
    #     confusing UX where a deploy of one PR blocks an unrelated PR.
    #     Re-evaluate once ephemeral dev stacks support pre-merge smoke tests.
    #
    #   Option B (suppression-with-rationale, CHOSEN): keep smoke tests as
    #     informational. PR authors must check the smoke-test status after their
    #     PR is deployed and either confirm green OR document known failures via
    #     the PR template checklist (Issue #211 section added to PR template).
    #
    # RATIONALE comment convention: if a smoke test step must be skipped or
    # is expected to fail for a known reason, add a comment to that step:
    #   # RATIONALE: <reason> — tracked in #<issue>
    # The workflow-lint job will flag steps that have `continue-on-error: true`
    # without a RATIONALE comment (enforcement added in Issue #211 follow-up).
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/tests/smoke/package-lock.json

      - name: Install smoke test dependencies
        working-directory: backend/tests/smoke
        run: npm ci

      - name: Run smoke tests against deployed API
        working-directory: backend/tests/smoke
        env:
          API_URL: ${{ needs.deploy-dev.outputs.api_url }}
          USER_POOL_ID: ${{ secrets.DEV_USER_POOL_ID }}
        # The backend smoke test (backend/tests/smoke/smoke.test.ts) registers
        # FRESH users each run (per its docstring) and just needs a password
        # strong enough to satisfy Cognito's policy. We previously read this
        # from `secrets.SMOKE_TEST_PASSWORD`, but that secret was never
        # configured in repo settings — every post-deploy run failed with
        # `❌ TEST_PASSWORD environment variable is required` before the suite
        # even started. Generating per-run with openssl removes the operational
        # dependency entirely and keeps the password ephemeral. `::add-mask::`
        # ensures the value is redacted from the workflow log if anything
        # downstream prints it.
        run: |
          GENERATED_PASS="$(openssl rand -base64 24 | tr -d '/+' | head -c 20)Aa1!"
          echo "::add-mask::$GENERATED_PASS"
          export TEST_PASSWORD="$GENERATED_PASS"
          npm run test:smoke

      - name: Smoke Test Summary
        if: always()
        run: |
          echo "========================================="
          echo "Smoke Test Summary"
          echo "========================================="
          echo "API URL: ${{ needs.deploy-dev.outputs.api_url }}"
          echo "Tests completed at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "========================================="

  integration-tests:
    name: Run Backend Integration Tests
    runs-on: ubuntu-latest
    needs: deploy-dev
    # Boy-scout (#240): add timeout-minutes so a hung integration test cannot
    # hold the deploy-${ref} concurrency lock indefinitely. The translation-flow
    # integration test has --testTimeout=600000 (10 min) for individual tests;
    # 30 minutes total is generous headroom for the full suite.
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev'))

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          # integration-tests runs `npm ci` in shared-types AND backend/functions
          # below. List both lockfiles so the cache key reflects the full set.
          cache-dependency-path: |
            shared-types/package-lock.json
            backend/functions/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-LFMT-Integration-Tests
          aws-region: ${{ env.AWS_REGION }}

      - name: Install shared-types dependencies
        working-directory: shared-types
        run: npm ci

      - name: Install function dependencies
        working-directory: backend/functions
        run: npm ci

      # Issue #248 / OMC R2 F-1: the former `Get API URL` step made a standalone
      # describe-stacks call against LfmtPocDev — the same stack that deploy-dev
      # already queried 30 seconds earlier. That is pure CFN API waste and a
      # second drift point (two invocations with different --query shapes).
      # deploy-dev already exports `api_url` as a job output; consume it here
      # directly, mirroring the pattern the `smoke-tests` job above uses.
      - name: Wait for API to be ready
        run: |
          echo "Waiting for API to be ready..."
          for i in {1..30}; do
            # Check if API Gateway responds (any HTTP status including 401 is acceptable)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" ${{ needs.deploy-dev.outputs.api_url }}auth/me 2>/dev/null || echo "000")
            if [[ "$HTTP_CODE" != "000" && "$HTTP_CODE" != "502" && "$HTTP_CODE" != "503" && "$HTTP_CODE" != "504" ]]; then
              echo "API is ready! (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i/30: API not ready yet (HTTP $HTTP_CODE), waiting 10 seconds..."
            sleep 10
          done
          echo "Warning: API may not be fully ready, proceeding with tests anyway"
        continue-on-error: true

      - name: Run Health Check Integration Tests
        working-directory: backend/functions
        run: npm run test:integration -- health-check.integration.test.ts
        env:
          API_BASE_URL: ${{ needs.deploy-dev.outputs.api_url }}

      - name: Run API Integration Tests
        working-directory: backend/functions
        run: npm run test:integration -- api-integration.test.ts
        env:
          API_BASE_URL: ${{ needs.deploy-dev.outputs.api_url }}

      - name: Run Translation Flow Integration Tests
        working-directory: backend/functions
        run: npm run test:integration -- translation-flow.integration.test.ts --testTimeout=600000
        env:
          API_BASE_URL: ${{ needs.deploy-dev.outputs.api_url }}
          TEST_TIMEOUT: 600000

      - name: Backend Integration Test Summary
        if: always()
        run: |
          echo "========================================="
          echo "Backend Integration Test Summary"
          echo "========================================="
          echo "API URL: ${{ needs.deploy-dev.outputs.api_url }}"
          echo "Tests completed at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "========================================="

  deploy-staging:
    name: Deploy Backend to Staging
    runs-on: ubuntu-latest
    needs: test
    # Boy-scout (#253 expansion round): same `timeout-minutes` discipline as
    # deploy-dev above. Staging deploys are always full (no diff short-circuit
    # — see Gap 2 rationale block below `Configure AWS credentials`) so the
    # expected wall-clock is closer to dev's full-deploy path: ~5-8 min CDK
    # + ~2-3 min frontend rebuild + ~3 min CloudFront wait. 30 gives ~2x
    # headroom and still trips before the GitHub Actions 6-hour cap would.
    timeout-minutes: 30
    # Issue #160 (branch-guard asymmetry): previously only checked environment
    # input but not github.ref, allowing any branch to deploy to staging via
    # `gh workflow run deploy-backend.yml --ref feature/foo -f environment=staging`.
    # deploy-dev already required main — staging and prod now mirror that guard.
    # Defense-in-depth: enforce main-only at the workflow level in addition to
    # any GitHub Environment protection rules.
    # IMPORTANT: do NOT remove the `github.ref == 'refs/heads/main'` clause
    # without adding an equivalent carve-out (e.g. hotfix/* branches) and
    # documenting it here. Three incidents in one quarter traced back to
    # insufficient branch-ref guards (Issues #149, #152, #160).
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.lfmt.yourcompany.com

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          # Issue #247: staging runs `npm ci` in the same four directories as
          # deploy-dev (shared-types, backend/functions, backend/infrastructure,
          # frontend via the rebuild-frontend composite action below). Without
          # `cache-dependency-path` listed, the setup-node cache key isn't seeded
          # and the four installs each cold-fetch from the registry — adding ~60s
          # to every staging deploy. Mirror deploy-dev's list so the cache hits.
          cache-dependency-path: |
            shared-types/package-lock.json
            backend/functions/package-lock.json
            backend/infrastructure/package-lock.json
            frontend/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-LFMT-Deploy-Staging
          aws-region: ${{ env.AWS_REGION }}

      # Boy-scout (#253 expansion round): mirror deploy-dev (line 209) and
      # deploy-prod (analogous step). Surfacing the assumed-role ARN in the
      # workflow log is part of the audit trail for any staging deploy and
      # gives operators a fast triage signal when an OIDC misconfiguration
      # silently lands the workflow in the wrong account.
      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Install shared-types dependencies
        working-directory: shared-types
        run: npm ci

      - name: Install function dependencies
        working-directory: backend/functions
        run: npm ci

      - name: Install infrastructure dependencies
        working-directory: backend/infrastructure
        run: npm ci

      # Issue #253 (Gap 1) — staging/prod deploy-pipeline parity:
      # mirror deploy-dev's idempotent CDKToolkit guard. Without this, the
      # first-ever staging deploy against a fresh account/region fails with
      # "This stack uses assets, so the toolkit stack must be deployed to
      # the environment (Run `cdk bootstrap aws://...`)" — a footgun that
      # only fires once but blocks the very first stand-up of a new staging
      # account. The block is textually identical to the one in deploy-dev
      # and deploy-prod (grep for `CDK Bootstrap (if needed)`); do not
      # refactor into a composite action without keeping all three call-
      # sites parallel — operators rely on the inline form for run-log
      # readability when triaging a fresh-account bootstrap.
      - name: CDK Bootstrap (if needed)
        working-directory: backend/infrastructure
        run: |
          if ! aws cloudformation describe-stacks --stack-name CDKToolkit --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "CDKToolkit not found, bootstrapping..."
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            npx cdk bootstrap aws://${ACCOUNT_ID}/${{ env.AWS_REGION }}
          else
            echo "CDKToolkit already exists, skipping bootstrap"
          fi

      # Issue #253 (Gap 2) — intentional asymmetry with deploy-dev:
      #
      # deploy-dev runs a `cdk diff` short-circuit (Issue #163, the
      # `Check for CDK infrastructure changes` step + the `if:
      # steps.cdk-diff.outputs.has_changes == 'true'` gate above its
      # `CDK Deploy to Dev` step) that skips `cdk deploy` when no
      # infrastructure changes are detected. deploy-staging and
      # deploy-prod deliberately DO NOT replicate that optimization.
      # Rationale:
      #
      #   1. Trigger semantics differ. deploy-dev fires on every push to
      #      main AND on workflow_dispatch (default env=dev). The push-
      #      triggered path runs on shared-types-only or backend-only
      #      commits that may have no infra impact — that's the noop case
      #      #163 optimizes away. deploy-staging/prod are workflow_dispatch
      #      ONLY (see their job-level `if:` guards), so every invocation
      #      carries explicit operator intent to deploy.
      #
      #   2. UX. A manual dispatch that exits in ~30s with "no changes" is
      #      ambiguous: did the deploy run? Was the frontend rebuild step
      #      gated out? Did the smoke check actually validate the new code?
      #      Operators expect a manual staging/prod deploy to be a full
      #      deploy, not a conditional fast-path.
      #
      #   3. Audit-trail-first design. deploy-prod already has a `CDK Diff
      #      (show changes for audit trail)` step that records the proposed
      #      change-set in the workflow log BEFORE the deploy runs. Adding
      #      a has_changes gate would either duplicate that diff (wasted
      #      ~30s) or remove the audit step (lost paper trail). Both are
      #      worse than the current always-deploy behaviour.
      #
      # Do NOT replicate the deploy-dev short-circuit here without first
      # re-evaluating points 1-3 against the then-current trigger semantics.
      - name: CDK Deploy to Staging
        working-directory: backend/infrastructure
        run: npx cdk deploy --context environment=staging --require-approval never

      # Issue #187: rebuild sequence extracted to composite action for DRY.
      # Source of truth for cache-control headers, CF invalidation wait, etc.
      - name: Rebuild and deploy frontend
        id: frontend
        uses: ./.github/actions/rebuild-frontend
        with:
          stack-name: LfmtPocStaging
          aws-region: ${{ env.AWS_REGION }}
          node-version: ${{ env.NODE_VERSION }}

      # Boy-scout (#253 expansion round): mirror deploy-dev's `Test API Health`
      # step (line 312). Without this, a deploy that succeeded at the CFN
      # layer but produced an unreachable API Gateway (DNS lag, custom-domain
      # misconfig, broken Lambda authorizer) would only be caught by the
      # operator's manual smoke. The curl is non-blocking (`|| echo …`)
      # because API Gateway can take a few seconds post-deploy to propagate
      # custom-domain mappings — a transient 5xx is not a deploy failure,
      # but the line in the run log is the audit signal that the operator
      # should re-check if the manual smoke later reveals trouble.
      - name: Test API Health (staging)
        run: |
          curl -f ${{ steps.frontend.outputs.api_url }}/v1/auth || echo "API not yet ready, may need warm-up"

      - name: Staging Deployment Summary
        run: |
          echo "========================================="
          echo "Staging Deployment Summary"
          echo "========================================="
          echo "Frontend URL: ${{ steps.frontend.outputs.frontend_url }}"
          echo "API URL: ${{ steps.frontend.outputs.api_url }}"
          echo "========================================="

  deploy-prod:
    name: Deploy Backend to Production
    runs-on: ubuntu-latest
    needs: test
    # Boy-scout (#253 expansion round): same `timeout-minutes` discipline as
    # deploy-dev/deploy-staging above, with extra headroom. Prod runs the
    # additional `CDK Diff (show changes for audit trail)` step (~30s) on top
    # of the full deploy + frontend rebuild + CloudFront wait, and a prod
    # CFN update can take longer than staging if there are more resources to
    # update (Cognito user-pool changes, in particular, can take 5-10 min on
    # their own). 45 min gives ~3x headroom over a typical full deploy while
    # still tripping before the GitHub Actions 6-hour cap.
    timeout-minutes: 45
    # Issue #160 (branch-guard asymmetry): mirrors the fix applied to
    # deploy-staging above. See that job's comment block for rationale.
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment:
      name: production
      url: https://lfmt.yourcompany.com

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          # Issue #247: mirror deploy-staging's cache-dependency-path. The prod
          # job runs `npm ci` in the same four directories; without seeding the
          # cache key the four installs each cold-fetch from the registry.
          cache-dependency-path: |
            shared-types/package-lock.json
            backend/functions/package-lock.json
            backend/infrastructure/package-lock.json
            frontend/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-LFMT-Deploy-Prod
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: |
          echo "Deploying to production with identity:"
          aws sts get-caller-identity

      - name: Install shared-types dependencies
        working-directory: shared-types
        run: npm ci

      - name: Install function dependencies
        working-directory: backend/functions
        run: npm ci

      - name: Install infrastructure dependencies
        working-directory: backend/infrastructure
        run: npm ci

      - name: CDK Bootstrap (if needed)
        working-directory: backend/infrastructure
        run: |
          if ! aws cloudformation describe-stacks --stack-name CDKToolkit --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "CDKToolkit not found, bootstrapping..."
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            npx cdk bootstrap aws://${ACCOUNT_ID}/${{ env.AWS_REGION }}
          else
            echo "CDKToolkit already exists, skipping bootstrap"
          fi

      - name: CDK Diff (show changes for audit trail)
        working-directory: backend/infrastructure
        run: npx cdk diff --context environment=prod || true

      # Issue #253 (Gap 2) — intentional asymmetry with deploy-dev:
      # see the matching block in deploy-staging (above the `CDK Deploy to
      # Staging` step) for the full rationale. Short version: deploy-prod
      # is workflow_dispatch-only, so every invocation is explicit operator
      # intent — a has_changes gate would surprise operators and would
      # either duplicate or supplant the audit-trail `cdk diff` step above.
      # Keep this `cdk deploy` call unconditional. Do NOT add a has_changes
      # gate without re-reading the rationale on deploy-staging.
      - name: CDK Deploy Main Infrastructure
        working-directory: backend/infrastructure
        run: npx cdk deploy LfmtPocProd --context environment=prod --require-approval never

      # Issue #187: rebuild sequence extracted to composite action for DRY.
      # Source of truth for cache-control headers, CF invalidation wait, etc.
      - name: Rebuild and deploy frontend
        id: frontend
        uses: ./.github/actions/rebuild-frontend
        with:
          stack-name: LfmtPocProd
          aws-region: ${{ env.AWS_REGION }}
          node-version: ${{ env.NODE_VERSION }}

      # Boy-scout (#253 expansion round): mirror deploy-dev's `Test API Health`
      # step (line 312) and the analogous staging step above. Same rationale:
      # cheap audit signal for the CFN-succeeds-but-API-unreachable failure
      # mode. Non-blocking by design (`|| echo …`) — a transient 5xx during
      # custom-domain propagation should not fail the prod deploy run, but
      # the line in the run log is the audit signal that lets the operator
      # know to re-check via manual smoke if the production-frontend traffic
      # later shows trouble.
      - name: Test API Health (prod)
        run: |
          curl -f ${{ steps.frontend.outputs.api_url }}/v1/auth || echo "API not yet ready, may need warm-up"

      - name: Production Deployment Summary
        run: |
          echo "========================================="
          echo "Production Deployment Summary"
          echo "========================================="
          echo "Environment: production"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "Stack: LfmtPocProd"
          echo "Frontend URL: ${{ steps.frontend.outputs.frontend_url }}"
          echo "API URL: ${{ steps.frontend.outputs.api_url }}"
          echo "Deployed at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "========================================="
